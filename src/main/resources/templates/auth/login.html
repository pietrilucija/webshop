<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body style="background: linear-gradient(135deg, var(--rose-light) 0%, var(--nude) 100%); min-height: 100vh;">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4 col-sm-10">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center mb-3"
                     style="width:64px;height:64px;background:white;border-radius:50%;box-shadow:var(--shadow-sm);">
                    <i class="bi bi-heart-fill fs-4" style="color: var(--rose);"></i>
                </div>
                <h2 class="mb-1">Dobrodošli natrag</h2>
                <p class="text-muted small">Prijavite se na svoj Blush &amp; Glow račun</p>
            </div>

            <div class="card auth-card">
                <div class="card-body p-4">

                    <div th:if="${param.error}" class="alert alert-danger small py-2 mb-3">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        Neispravni email ili lozinka.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-blush small py-2 mb-3">
                        <i class="bi bi-check-circle me-1"></i>
                        Uspješno ste se odjavili.
                    </div>
                    <div th:if="${success}" class="alert alert-blush small py-2 mb-3">
                        <i class="bi bi-check-circle me-1"></i>
                        <span th:text="${success}"></span>
                    </div>

                    <form th:action="@{/auth/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Email adresa</label>
                            <input type="email" name="username" class="form-control"
                                   placeholder="vas@email.com" required autocomplete="email">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Lozinka</label>
                            <input type="password" name="password" class="form-control"
                                   placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-blush w-100 py-2">
                            Prijavi se
                        </button>
                    </form>

                    <hr style="border-color: var(--rose-light); margin: 20px 0;">

                    <p class="text-center mb-0 small text-muted">
                        Nemate račun?
                        <a th:href="@{/auth/register}"
                           style="color: var(--rose); font-weight: 600;">Registrirajte se</a>
                    </p>
                </div>
            </div>

            <!-- Test credentials hint -->
            <div class="text-center mt-3 small text-muted">
                <span>Test: <code>admin@blush.hr</code> / <code>admin123</code></span>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
