<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${pageTitle != null ? pageTitle + ' | Blush &amp; Glow' : 'Blush &amp; Glow'}">Blush & Glow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<nav th:fragment="adminNavbar" class="navbar navbar-blush sticky-top px-3 d-flex justify-content-between align-items-center">
    <a class="navbar-brand" th:href="@{/}">
        <i class="bi bi-heart-fill" style="color: #d4849f;"></i> Blush &amp; Glow
        <span class="badge bg-secondary ms-2 small fw-normal">Admin</span>
    </a>
    <div class="d-flex align-items-center gap-3">
        <span class="small text-muted">
            <i class="bi bi-person-circle"></i>
            <span sec:authentication="name"></span>
        </span>
        <form th:action="@{/auth/logout}" method="post">
            <button type="submit" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-box-arrow-right"></i> Odjava
            </button>
        </form>
    </div>
</nav>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-blush sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-heart-fill" style="color: #d4849f;"></i> Blush &amp; Glow
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Proizvodi</a>
                </li>
            </ul>
            <ul class="navbar-nav align-items-center">

                <!-- Košarica s badge-om -->
                <li class="nav-item">
                    <a class="nav-link position-relative" th:href="@{/cart}">
                        <i class="bi bi-bag"></i> Košarica
                        <span th:if="${cartCount != null and cartCount > 0}"
                              class="cart-badge" th:text="${cartCount}">0</span>
                    </a>
                </li>

                <!-- Admin link -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}">
                        <i class="bi bi-gear"></i> Admin
                    </a>
                </li>

                <!-- Neautentificirani -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/auth/login}">Prijava</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link btn-blush-outline btn btn-sm ms-1"
                       th:href="@{/auth/register}">Registracija</a>
                </li>

                <!-- Autentificirani -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/orders/history}">
                        <i class="bi bi-receipt"></i> Narudžbe
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-muted small px-2">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">korisnik</span>
                    </span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/auth/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link"
                                style="text-decoration:none; color: var(--text-muted);">
                            <i class="bi bi-box-arrow-right"></i> Odjava
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
</html>
