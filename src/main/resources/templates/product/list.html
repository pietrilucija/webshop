<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4">

    <!-- Zaglavlje -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="section-title mb-0">Svi proizvodi</h2>
    </div>

    <!-- Filter kategorija -->
    <div class="d-flex flex-wrap gap-2 mb-4">
        <a th:href="@{/products}"
           class="btn btn-sm"
           th:classappend="${selectedCategory == null} ? 'btn-blush' : 'btn-blush-outline'">
            Sve
        </a>
        <a th:each="cat : ${categories}"
           th:href="@{/products(categoryId=${cat.id})}"
           th:text="${cat.name}"
           class="btn btn-sm"
           th:classappend="${selectedCategory != null and selectedCategory == cat.id} ? 'btn-blush' : 'btn-blush-outline'">
        </a>
    </div>

    <!-- Grid proizvoda -->
    <div class="row">
        <div class="col-6 col-md-3 mb-4" th:each="product : ${products.content}">
            <div class="card product-card h-100">
                <div class="product-img-wrap">
                    <img th:src="${product.imageUrl != null ? product.imageUrl :
                                  'https://placehold.co/400x400/fce8ef/e8698a'}"
                         class="card-img-top" alt="">
                </div>
                <div class="card-body d-flex flex-column">
                    <span class="product-category-tag" th:text="${product.categoryName}"></span>
                    <h6 class="card-title" th:text="${product.name}">Naziv</h6>
                    <div class="d-flex justify-content-between align-items-center mt-auto">
                        <span class="price"
                              th:text="${#numbers.formatDecimal(product.price, 1, 2)} + ' €'">0 €</span>
                        <div class="d-flex gap-1">
                            <a th:href="@{/products/{id}(id=${product.id})}"
                               class="btn btn-blush-outline btn-sm" title="Detalji">
                                <i class="bi bi-eye"></i>
                            </a>
                            <form th:action="@{/cart/add}" method="post">
                                <input type="hidden" name="productId" th:value="${product.id}">
                                <input type="hidden" name="quantity" value="1">
                                <button type="submit" class="btn btn-blush btn-sm"
                                        title="Dodaj u košaricu">
                                    <i class="bi bi-bag-plus"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${products.content.isEmpty()}" class="col-12 text-center py-5">
            <i class="bi bi-search fs-1 d-block mb-3" style="color: var(--rose-light);"></i>
            <p class="text-muted">Nema proizvoda u ovoj kategoriji.</p>
        </div>
    </div>

    <!-- Paginacija -->
    <nav th:if="${products.totalPages > 1}" class="mt-2">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${products.number - 1}, categoryId=${selectedCategory})}">‹</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                th:classappend="${i == products.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/products(page=${i}, categoryId=${selectedCategory})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${products.number + 1}, categoryId=${selectedCategory})}">›</a>
            </li>
        </ul>
    </nav>

</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
