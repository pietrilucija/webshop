<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 admin-sidebar d-none d-md-block">
            <p class="text-muted small fw-bold mt-2 mb-3 text-uppercase" style="letter-spacing:.05em;">Navigacija</p>
            <a th:href="@{/admin}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a th:href="@{/admin/categories}" class="active"><i class="bi bi-tags me-2"></i> Kategorije</a>
            <a th:href="@{/admin/products}"><i class="bi bi-box me-2"></i> Proizvodi</a>
            <a th:href="@{/admin/orders}"><i class="bi bi-receipt me-2"></i> Narudžbe</a>
            <a th:href="@{/admin/login-history}"><i class="bi bi-clock-history me-2"></i> Login povijest</a>
        </div>

        <div class="col-md-10 py-4 px-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="section-title mb-0">Kategorije</h2>
                <a th:href="@{/admin/categories/add}" class="btn btn-blush">
                    <i class="bi bi-plus-lg me-1"></i> Nova kategorija
                </a>
            </div>

            <div th:if="${success}" class="alert alert-blush alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card auth-card p-0 overflow-hidden">
                <table class="table mb-0">
                    <thead>
                        <tr style="background: var(--rose-light);">
                            <th class="ps-3 py-3" style="width:60px;">#</th>
                            <th>Naziv</th>
                            <th>Opis</th>
                            <th class="pe-3">Akcije</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td class="ps-3 text-muted" th:text="${cat.id}">1</td>
                            <td class="fw-semibold" th:text="${cat.name}">Naziv</td>
                            <td class="text-muted small" th:text="${cat.description}">Opis</td>
                            <td class="pe-3">
                                <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                                   class="btn btn-sm btn-blush-outline me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}"
                                      method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm"
                                            style="color: #c0392b;"
                                            onclick="return confirm('Obrisati kategoriju?')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${categories.isEmpty()}">
                            <td colspan="4" class="text-center py-4 text-muted">Nema kategorija.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
