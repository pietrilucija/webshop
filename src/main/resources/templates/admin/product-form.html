<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 admin-sidebar d-none d-md-block">
            <p class="text-muted small fw-bold mt-2 mb-3 text-uppercase" style="letter-spacing:.05em;">Navigacija</p>
            <a th:href="@{/admin}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a th:href="@{/admin/categories}"><i class="bi bi-tags me-2"></i> Kategorije</a>
            <a th:href="@{/admin/products}" class="active"><i class="bi bi-box me-2"></i> Proizvodi</a>
            <a th:href="@{/admin/orders}"><i class="bi bi-receipt me-2"></i> Narudžbe</a>
            <a th:href="@{/admin/login-history}"><i class="bi bi-clock-history me-2"></i> Login povijest</a>
        </div>

        <div class="col-md-10 py-4 px-4">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a th:href="@{/admin/products}" class="btn btn-blush-outline btn-sm">
                    <i class="bi bi-arrow-left me-1"></i> Natrag
                </a>
                <h2 class="section-title mb-0"
                    th:text="${productId != null} ? 'Uredi proizvod' : 'Novi proizvod'">
                </h2>
            </div>

            <div class="row justify-content-start">
                <div class="col-md-7">
                    <div class="card auth-card p-4">
                        <form th:action="${productId != null} ?
                                         @{/admin/products/edit/{id}(id=${productId})} :
                                         @{/admin/products/add}"
                              method="post"
                              th:object="${productRequest}">

                            <div class="mb-3">
                                <label class="form-label">Naziv proizvoda</label>
                                <input type="text" th:field="*{name}"
                                       class="form-control" placeholder="npr. Matte ruž">
                                <p th:if="${#fields.hasErrors('name')}"
                                   th:errors="*{name}" class="text-danger small mt-1"></p>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Opis</label>
                                <textarea th:field="*{description}"
                                          class="form-control" rows="4"
                                          placeholder="Kratki opis proizvoda..."></textarea>
                                <p th:if="${#fields.hasErrors('description')}"
                                   th:errors="*{description}" class="text-danger small mt-1"></p>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-6">
                                    <label class="form-label">Cijena (€)</label>
                                    <input type="number" step="0.01" min="0"
                                           th:field="*{price}"
                                           class="form-control" placeholder="0.00">
                                    <p th:if="${#fields.hasErrors('price')}"
                                       th:errors="*{price}" class="text-danger small mt-1"></p>
                                </div>
                                <div class="col-6">
                                    <label class="form-label">Zaliha (kom)</label>
                                    <input type="number" min="0"
                                           th:field="*{stock}"
                                           class="form-control" placeholder="0">
                                    <p th:if="${#fields.hasErrors('stock')}"
                                       th:errors="*{stock}" class="text-danger small mt-1"></p>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">URL slike</label>
                                <input type="text" th:field="*{imageUrl}"
                                       class="form-control"
                                       placeholder="https://...">
                                <p class="small text-muted mt-1">
                                    Ostavi prazno za automatski placeholder.
                                </p>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Kategorija</label>
                                <select th:field="*{categoryId}" class="form-select">
                                    <option value="">— Odaberi kategoriju —</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.id}"
                                            th:text="${cat.name}">
                                    </option>
                                </select>
                                <p th:if="${#fields.hasErrors('categoryId')}"
                                   th:errors="*{categoryId}" class="text-danger small mt-1"></p>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-blush">
                                    <i class="bi bi-check-lg me-1"></i> Spremi
                                </button>
                                <a th:href="@{/admin/products}" class="btn btn-blush-outline">
                                    Odustani
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
