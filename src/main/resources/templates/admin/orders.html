<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<nav th:replace="~{fragments/header :: adminNavbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 admin-sidebar d-none d-md-block">
            <p class="text-muted small fw-bold mt-2 mb-3 text-uppercase" style="letter-spacing:.05em;">Navigacija</p>
            <a th:href="@{/admin}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a th:href="@{/admin/categories}"><i class="bi bi-tags me-2"></i> Kategorije</a>
            <a th:href="@{/admin/products}"><i class="bi bi-box me-2"></i> Proizvodi</a>
            <a th:href="@{/admin/orders}" class="active"><i class="bi bi-receipt me-2"></i> Narudžbe</a>
            <a th:href="@{/admin/login-history}"><i class="bi bi-clock-history me-2"></i> Login povijest</a>
        </div>

        <div class="col-md-10 py-4 px-4">
            <h2 class="section-title mb-4">Sve narudžbe</h2>

            <!-- Filteri -->
            <form th:action="@{/admin/orders}" method="get"
                  class="card auth-card p-3 mb-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Kupac</label>
                        <select name="userId" class="form-select">
                            <option value="">Svi kupci</option>
                            <option th:each="u : ${users}"
                                    th:value="${u.id}"
                                    th:text="${u.firstName + ' ' + u.lastName + ' (' + u.email + ')'}"
                                    th:selected="${selectedUserId != null and selectedUserId == u.id}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Od datuma</label>
                        <input type="datetime-local" name="from"
                               class="form-control" th:value="${from}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Do datuma</label>
                        <input type="datetime-local" name="to"
                               class="form-control" th:value="${to}">
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-blush w-100">
                            <i class="bi bi-search me-1"></i> Filtriraj
                        </button>
                    </div>
                </div>
            </form>

            <!-- Narudžbe -->
            <div th:if="${orders.content.isEmpty()}" class="text-center py-5 text-muted">
                <i class="bi bi-receipt fs-1 d-block mb-2" style="color: var(--rose-light);"></i>
                Nema narudžbi za odabrane filtere.
            </div>

            <div class="card auth-card mb-3 p-3"
                 th:each="order : ${orders.content}">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <strong>Narudžba #<span th:text="${order.id}">1</span></strong>
                        <span class="ms-2 text-muted small"
                              th:text="${order.customerEmail}">email</span>
                    </div>
                    <div class="text-end">
                        <span class="order-status-badge"
                              th:classappend="${order.status == 'PAID'} ? 'status-paid' :
                                             (${order.status == 'SHIPPED'} ? 'status-shipped' :
                                             (${order.status == 'CANCELLED'} ? 'status-cancelled' : 'status-pending'))"
                              th:text="${order.status == 'PAID'} ? 'Plaćeno' :
                                       (${order.status == 'SHIPPED'} ? 'Isporučeno' :
                                       (${order.status == 'CANCELLED'} ? 'Otkazano' : 'Na čekanju'))">
                        </span>
                    </div>
                </div>
                <p class="small text-muted mb-2">
                    <i class="bi bi-calendar3 me-1"></i>
                    <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy. HH:mm')}">datum</span>
                    &nbsp;|&nbsp;
                    <i class="bi bi-credit-card me-1"></i>
                    <span th:text="${order.paymentMethod == 'PAYPAL'} ? 'PayPal' : 'Gotovina - pouzeće'">
                    </span>
                    &nbsp;|&nbsp;
                    <strong style="color: var(--rose-dark);"
                            th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)} + ' €'">0 €</strong>
                </p>
                <table class="table table-sm mb-0">
                    <tbody>
                        <tr th:each="item : ${order.items}">
                            <td th:text="${item.productName}">Proizvod</td>
                            <td class="text-muted" th:text="${item.quantity} + ' kom'">1</td>
                            <td class="text-end"
                                th:text="${#numbers.formatDecimal(item.unitPrice, 1, 2)} + ' €'">0 €</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
