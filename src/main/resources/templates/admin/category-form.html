<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<nav th:replace="~{fragments/header :: adminNavbar}"></nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 admin-sidebar d-none d-md-block">
            <p class="text-muted small fw-bold mt-2 mb-3 text-uppercase" style="letter-spacing:.05em;">Navigacija</p>
            <a th:href="@{/admin}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            <a th:href="@{/admin/categories}" class="active"><i class="bi bi-tags me-2"></i> Kategorije</a>
            <a th:href="@{/admin/products}"><i class="bi bi-box me-2"></i> Proizvodi</a>
            <a th:href="@{/admin/orders}"><i class="bi bi-receipt me-2"></i> Narudžbe</a>
            <a th:href="@{/admin/login-history}"><i class="bi bi-clock-history me-2"></i> Login povijest</a>
        </div>

        <div class="col-md-10 py-4 px-4">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a th:href="@{/admin/categories}" class="btn btn-blush-outline btn-sm">
                    <i class="bi bi-arrow-left me-1"></i> Natrag
                </a>
                <h2 class="section-title mb-0"
                    th:text="${categoryId != null} ? 'Uredi kategoriju' : 'Nova kategorija'">
                </h2>
            </div>

            <div class="row">
                <div class="col-md-5">
                    <div class="card auth-card p-4">
                        <form th:action="${categoryId != null} ?
                                         @{/admin/categories/edit/{id}(id=${categoryId})} :
                                         @{/admin/categories/add}"
                              method="post"
                              th:object="${categoryRequest}">

                            <div class="mb-3">
                                <label class="form-label">Naziv kategorije</label>
                                <input type="text" th:field="*{name}"
                                       class="form-control" placeholder="npr. Usne">
                                <p th:if="${#fields.hasErrors('name')}"
                                   th:errors="*{name}" class="text-danger small mt-1"></p>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Opis</label>
                                <textarea th:field="*{description}"
                                          class="form-control" rows="3"
                                          placeholder="Kratki opis kategorije..."></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-blush">
                                    <i class="bi bi-check-lg me-1"></i> Spremi
                                </button>
                                <a th:href="@{/admin/categories}" class="btn btn-blush-outline">
                                    Odustani
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
